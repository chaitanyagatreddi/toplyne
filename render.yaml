services:
  - type: web
    name: toplyne
    runtime: docker
    plan: starter          # $7/mo — stays warm 24/7 (free tier sleeps on idle)
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    autoDeploy: true       # redeploy on push to the connected branch
    envVars:
      # Secrets — set the actual values in the Render dashboard, not here.
      - key: OPENAI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: BROWSERBASE_API_KEY
        sync: false
      - key: BROWSERBASE_PROJECT_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
